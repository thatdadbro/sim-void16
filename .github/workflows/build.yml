name: Build ZMK Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# These two environment flags force GitHub to ignore Node version locks and build anyway
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Cache ZMK Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildcache
            zephyr/.ccache
          key: ${{ runner.os }}-zmk-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-zmk-ccache-

      - name: Initialize ZMK Workspace
        run: |
          pip3 install west
          west init -l config
          west update

      - name: Compile Seeeduino Xiao Firmware
        run: |
          west build -b seeeduino_xiao -- -DZMK_CONFIG="${{ github.workspace }}/config"

      - name: Upload Flashable Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seeeduino_xiao-zmk
          path: |
            build/zephyr/zmk.uf2
            build/zephyr/zmk.bin
