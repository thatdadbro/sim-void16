name: Build ZMK Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    # Explicitly using 22.04 forces GitHub to allow the legacy Node environment needed by ZMK
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Cache ZMK Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildcache
            zephyr/.ccache
          key: ${{ runner.os }}-zmk-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-zmk-ccache-

      - name: Initialize ZMK Workspace
        run: |
          pip3 install west
          west init -l config
          west update

      - name: Compile Seeeduino Xiao Firmware
        run: |
          west build -b seeeduino_xiao -- -DZMK_CONFIG="${{ github.workspace }}/config"

      - name: Upload Flashable Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seeeduino_xiao-zmk
          path: |
            build/zephyr/zmk.uf2
            build/zephyr/zmk.bin
